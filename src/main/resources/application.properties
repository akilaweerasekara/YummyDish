server.port=8080
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.web.resources.static-locations=classpath:/static/

# ── Fix ERR_INCOMPLETE_CHUNKED_ENCODING ──────────────────────────
# Buffer the full response before sending — prevents mid-stream errors
server.tomcat.connection-timeout=60000
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Increase Tomcat thread and buffer settings for large JSP pages
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.max-http-form-post-size=10MB

# Enable response compression (helps with large dashboard HTML)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# ── Logging — show errors in console ─────────────────────────────
logging.level.root=WARN
logging.level.com.yummydish=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.apache.catalina=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{20} - %msg%n

